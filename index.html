<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miron Cinema | Пошук за кодом з TikTok</title>

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍿</text></svg>"
    />

    <style>
      body {
        font-family: sans-serif;
        background-color: #0a0a0c;
        color: #ffffff;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 90vh;
      }
      h1 {
        color: #e50914;
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 2.2rem;
      }
      .subtitle {
        color: #aaa;
        margin-bottom: 25px;
        font-size: 1rem;
      }
      #movie-title-display {
        font-size: 1.8rem;
        font-weight: bold;
        color: #fff;
        margin-bottom: 10px;
        min-height: 40px;
        text-align: center;
      }
      .movie-stats {
        display: none;
        align-items: center;
        gap: 20px;
        margin-bottom: 20px;
        font-size: 1rem;
        background: #121216;
        padding: 10px 20px;
        border-radius: 20px;
        border: 1px solid #23232a;
      }
      .stat-item {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #bbb;
      }
      .action-btn {
        background: none;
        border: none;
        color: #fff;
        cursor: pointer;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: 0.2s;
      }
      .action-btn:hover {
        transform: scale(1.1);
      }
      .action-btn.liked {
        color: #4caf50;
      }
      .action-btn.disliked {
        color: #f44336;
      }
      .search-container {
        display: flex;
        width: 100%;
        max-width: 500px;
        margin-bottom: 30px;
        gap: 10px;
      }
      .search-input {
        flex: 1;
        padding: 15px 25px;
        font-size: 1.1rem;
        background-color: #121216;
        border: 2px solid #23232a;
        border-radius: 30px;
        color: white;
        outline: none;
        text-align: center;
        transition: 0.2s;
      }
      .search-input:focus {
        border-color: #e50914;
        box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
      }
      .search-button {
        padding: 0 30px;
        background-color: #e50914;
        border: none;
        border-radius: 30px;
        color: white;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.2s;
      }
      .search-button:hover {
        background-color: #b80710;
      }
      .player-section {
        width: 100%;
        max-width: 800px;
        background-color: #000000;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        border: 1px solid #23232a;
        display: none;
      }
      .player-crop {
        position: relative;
        width: 100%;
        height: 450px;
        overflow: hidden;
      }
      .player-crop iframe {
        position: absolute;
        width: 100%;
        height: 570px;
        top: -60px;
        left: 0;
        border: 0;
      }
    </style>
  </head>
  <body>
    <h1>MIRON CINEMA 🎬</h1>
    <div class="subtitle">Введи код фільму з ТікТоку, щоб почати перегляд</div>

    <div class="search-container">
      <input
        type="number"
        id="movie-code"
        class="search-input"
        placeholder="Введи код фільму..."
      />
      <button onclick="findMovieByCode()" class="search-button">
        Дивитись
      </button>
    </div>

    <div id="movie-title-display"></div>

    <div class="movie-stats" id="stats-box">
      <div class="stat-item">👁️ Перегляди: <span id="view-count">0</span></div>
      <button class="action-btn" id="like-btn" onclick="vote('like')">
        👍 <span id="like-count">0</span>
      </button>
      <button class="action-btn" id="dislike-btn" onclick="vote('dislike')">
        👎 <span id="dislike-count">0</span>
      </button>
    </div>

    <div class="player-section" id="player-box">
      <div class="player-crop">
        <iframe id="main-player" src="" allowfullscreen></iframe>
      </div>
    </div>

    <script>
      const movieDatabase = {
        1: { title: "Воно (2017) 🎈", imdbId: "tt1396484" },
        // ... (ваші інші фільми залишаються без змін)
        201: {
          title: "Невський 1 сезон (2015) 👮‍♂️",
          searchQuery: "Невский 1 сезон",
        },
        202: {
          title: "Невський 2 сезон (Усі серії) 👮‍♂️",
          searchQuery: "Невский 2 сезон",
        },
        203: {
          title: "Невський 3 сезон (Усі серії) 👮‍♂️",
          searchQuery: "Невский 3 сезон",
        },
        204: {
          title: "Невський 4 сезон (Усі серії) 👮‍♂️",
          searchQuery: "Невский 4 сезон",
        },
        205: {
          title: "Невський 5 сезон (Усі серії) 👮‍♂️",
          searchQuery: "Невский 5 сезон",
        },
        206: {
          title: "Невський 6 сезон (Усі серії) 👮‍♂️",
          searchQuery: "Невский 6 сезон",
        },
        207: {
          title: "Невський 7 сезон (Усі серії) 👮‍♂️",
          searchQuery: "Невский 7 сезон",
        },
      };

      let currentMovieCode = null;

      function getMovieStats(code) {
        let stats = localStorage.getItem("miron_stats_" + code);
        return stats ? JSON.parse(stats) : { views: 0, likes: 0, dislikes: 0 };
      }

      function findMovieByCode() {
        const inputCode = document.getElementById("movie-code").value.trim();
        const playerBox = document.getElementById("player-box");
        const player = document.getElementById("main-player");
        const titleDisplay = document.getElementById("movie-title-display");
        const statsBox = document.getElementById("stats-box");

        const foundMovie = movieDatabase[inputCode];

        if (foundMovie) {
          currentMovieCode = inputCode;
          playerBox.style.display = "block";
          statsBox.style.display = "flex";
          titleDisplay.innerText = foundMovie.title;

          let stats = getMovieStats(inputCode);
          stats.views += 1;
          localStorage.setItem(
            "miron_stats_" + inputCode,
            JSON.stringify(stats)
          );

          document.getElementById("view-count").innerText = stats.views;
          document.getElementById("like-count").innerText = stats.likes;
          document.getElementById("dislike-count").innerText = stats.dislikes;

          // ВИБІР ПОШУКУ: IMDB ID або Назва
          const query = foundMovie.imdbId
            ? foundMovie.imdbId
            : foundMovie.searchQuery;
          player.src =
            "https://on.kinohub.vip/player/?query=" + encodeURIComponent(query);

          window.scrollTo({ top: 250, behavior: "smooth" });
        } else {
          alert("Фільм не знайдено!");
        }
      }

      function vote(type) {
        if (!currentMovieCode) return;
        let stats = getMovieStats(currentMovieCode);
        if (type === "like") {
          stats.likes++;
        } else {
          stats.dislikes++;
        }
        localStorage.setItem(
          "miron_stats_" + currentMovieCode,
          JSON.stringify(stats)
        );
        document.getElementById("like-count").innerText = stats.likes;
        document.getElementById("dislike-count").innerText = stats.dislikes;
      }
    </script>
  </body>
</html>
